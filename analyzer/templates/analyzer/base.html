<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CodeMap — AI-powered codebase analyzer and documentation generator">
    <title>{% block title %}CodeMap{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="{% url 'analyzer:upload' %}" class="navbar-brand">
            <span class="logo-icon">🗺️</span>
            CodeMap
        </a>
        <ul class="navbar-nav">
            <li><a href="{% url 'analyzer:upload' %}" class="{% block nav_upload %}{% endblock %}">Upload</a></li>
            <li><a href="{% url 'analyzer:project_list' %}" class="{% block nav_projects %}{% endblock %}">Projects</a></li>
            <li><a href="{% url 'admin:index' %}">Admin</a></li>
        </ul>
    </nav>

    <!-- Flash Messages -->
    {% if messages %}
    <div class="container" style="padding-bottom: 0;">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Main Content -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Mermaid.js for diagram rendering -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            mermaid.initialize({
                startOnLoad: true,
                theme: 'dark',
                themeVariables: {
                    darkMode: true,
                    background: '#1a1f2e',
                    primaryColor: '#6366f1',
                    primaryTextColor: '#f0f4f8',
                    primaryBorderColor: '#818cf8',
                    lineColor: '#94a3b8',
                    secondaryColor: '#232a3d',
                    tertiaryColor: '#0f1420'
                }
            });
        });
    </script>

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
